<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle 1 DFA: Eight Parts of Speech</title>
    <style>
        :root {
            --pnu-blue: #003366;
            --pnu-gold: #C5A059;
            --white: #ffffff;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            background: var(--white);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid var(--pnu-blue);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--pnu-gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .header h1 { color: var(--pnu-blue); margin: 0; font-size: 22px; }
        .header p { color: #666; font-size: 14px; margin: 5px 0; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            background-color: var(--pnu-blue);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background-color: #002244; }

        #quiz-section, #result-section { display: none; }

        .question { margin-bottom: 20px; }
        .options-list { list-style: none; padding: 0; }
        .option-item {
            background: #f9f9f9;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #eee;
            cursor: pointer;
        }

        .option-item:hover { background: #eef; }
        .selected { background: #d1e7ff !important; border-color: var(--pnu-blue); }

        .timer { color: #d9534f; font-weight: bold; text-align: right; margin-bottom: 10px;}
        
        #passing-slip {
            display: none;
            background: #fff;
            border: 4px double var(--pnu-gold);
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="auth-section">
        <div class="header">
            <h1>Cycle 1 DFA: Eight Parts of Speech</h1>
            <p>Select your name to begin the assessment</p>
        </div>
        
        <label>Select Participant (Last Name, First Name)</label>
        <select id="studentSelector">
            <option value="">-- Choose Name --</option>
            </select>
        
        <label>Program / Year / Section</label>
        <input type="text" id="studentSection" placeholder="e.g. CS1A">
        
        <button class="btn" onclick="startQuiz()">Start Assessment</button>
    </div>

    <div id="quiz-section">
        <div class="timer" id="time-display">Time Remaining: 30:00</div>
        <div id="question-container"></div>
        <button class="btn" onclick="nextQuestion()">Submit Answer</button>
    </div>

    <div id="result-section">
        <div id="feedback-msg"></div>
        <div id="passing-slip">
            <h2 style="color:var(--pnu-blue)">PASSING SLIP</h2>
            <p>This certifies that</p>
            <h3 id="slip-name"></h3>
            <p>has mastered <strong>Cycle 1: Parts of Speech</strong></p>
            <p id="log-status" style="font-size:12px; color:green;">Logging result...</p>
        </div>
        <button id="retry-btn" class="btn" style="display:none;" onclick="retryQuiz()">Try Again</button>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdJdmoBICivGuz9m_loDo6cGZcbf8glxJtYbmfQE7YLCAY5-A/formResponse"; 
    const ENTRY_ID = "entry.1247179532";

    // --- 2. STUDENT LIST ---
    // Just add your names here. They don't have to be in order; the code sorts them!
    const rawStudentList = [
        "Villanueva, Bethany P.",
        "Abad, Juan M.",
        "Zosa, Catherine G.",
        "Delos Reyes, Mark A.",
        "Bautista, Maria L."
        // ... add all your students here
    ];

    // Initialize the list
    const studentSelector = document.getElementById('studentSelector');
    rawStudentList.sort().forEach(name => {
        let opt = document.createElement('option');
        opt.value = name;
        opt.innerHTML = name;
        studentSelector.appendChild(opt);
    });

    const questions = [
        { q: "The students walked <strong>quietly</strong> into the library.", options: ["Noun", "Adjective", "Adverb", "Verb"], a: 2 },
        { q: "The <strong>university</strong> provides quality education.", options: ["Noun", "Verb", "Preposition", "Conjunction"], a: 0 },
        { q: "I wanted to attend, <strong>but</strong> it was cancelled.", options: ["Adjective", "Conjunction", "Pronoun", "Interjection"], a: 1 },
        { q: "The professor was <strong>impressed</strong>.", options: ["Adjective", "Noun", "Verb", "Adverb"], a: 0 },
        { q: "The books are <strong>under</strong> the table.", options: ["Verb", "Preposition", "Adjective", "Noun"], a: 1 }
    ];

    let currentQ = 0, score = 0, attempts = 1, startTime, timerInterval, selectedOption = null;

    function startQuiz() {
        if(!studentSelector.value || !document.getElementById('studentSection').value) {
            return alert("Please select your name and enter your section.");
        }
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        startTime = Date.now();
        loadQuestion();
        startTimer(1800);
    }

    function loadQuestion() {
        selectedOption = null;
        const qData = questions[currentQ];
        let html = `<div class="question"><h3>Question ${currentQ + 1}</h3><p>${qData.q}</p><div class="options-list">`;
        qData.options.forEach((opt, index) => {
            html += `<div class="option-item" onclick="selectOption(${index}, this)">${opt}</div>`;
        });
        html += `</div></div>`;
        document.getElementById('question-container').innerHTML = html;
    }

    function selectOption(idx, el) {
        selectedOption = idx;
        document.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    function nextQuestion() {
        if(selectedOption === null) return alert("Select an answer.");
        if(selectedOption === questions[currentQ].a) score++;
        currentQ++;
        if(currentQ < questions.length) loadQuestion();
        else showResults();
    }

    function showResults() {
        clearInterval(timerInterval);
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        
        const name = studentSelector.value;
        const section = document.getElementById('studentSection').value;
        const totalTime = Math.floor((Date.now() - startTime) / 1000);
        const dataStr = `${name}_${section}_Score${score}_Attempt${attempts}_Time${totalTime}s`;

        submitData(dataStr);

        if(score === questions.length) {
            document.getElementById('feedback-msg').innerHTML = "<h2>Assessment Complete</h2>";
            document.getElementById('passing-slip').style.display = 'block';
            document.getElementById('slip-name').innerText = name;
            document.getElementById('retry-btn').style.display = 'none';
        } else {
            document.getElementById('feedback-msg').innerHTML = `<h2>Score: ${score}/${questions.length}</h2><p>A perfect score is required for certification.</p>`;
            document.getElementById('retry-btn').style.display = 'block';
        }
    }

    function submitData(str) {
        const formData = new FormData();
        formData.append(ENTRY_ID, str);
        fetch(GOOGLE_FORM_URL, { method: "POST", mode: "no-cors", body: formData })
        .then(() => { document.getElementById('log-status').innerText = "Result logged successfully."; })
        .catch(() => { document.getElementById('log-status').innerText = "Error logging result."; });
    }

    function retryQuiz() {
        attempts++; currentQ = 0; score = 0;
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQuestion();
    }

    function startTimer(seconds) {
        let timer = seconds;
        timerInterval = setInterval(() => {
            let m = Math.floor(timer / 60), s = timer % 60;
            document.getElementById('time-display').innerText = `Time Remaining: ${m}:${s < 10 ? '0' : ''}${s}`;
            if (--timer < 0) { clearInterval(timerInterval); showResults(); }
        }, 1000);
    }
</script>

</body>
</html>
